name: Run Tests on Push

on:
  push:
    branches:
      - '**'
      - '!master'
      - '!feature/**'
  workflow_dispatch:

concurrency:
  group: joist-events-gem-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_ID: lib
  AWS_REGION: us-east-1
  CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
  AWS_ACCOUNT_ID_HUB: ${{ vars.AWS_ACCOUNT_ID_HUB }}

permissions:
  contents: read
  id-token: write
  statuses: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.setup.outputs.branch }}
      clean_branch_name: ${{ steps.setup.outputs.clean_branch_name }}
      build_name: ${{ steps.setup.outputs.build_name }}
      build_number: ${{ steps.setup.outputs.build_number }}
    steps:
      - id: setup
        uses: JoistApp/platform-ghactions/actions/setup-build-context@0.0.10
        with:
          branch: ${{ github.ref_name }}
          service_id: ${{ env.SERVICE_ID }}
          github_run_number: ${{ github.run_number }}

  test-standardrb:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - &codeartifact-aws-creds
        name: Configure AWS credentials (Hub for CodeArtifact)
        uses: JoistApp/platform-ghactions/actions/configure-aws-credentials@0.0.10
        with:
          aws_account_id: ${{ env.AWS_ACCOUNT_ID_HUB }}
          role_name: jst-hub-ghactions-ecr-role
          aws_region: ${{ env.AWS_REGION }}

      - &codeartifact-token
        name: Fetch CodeArtifact token
        id: codeartifact
        uses: JoistApp/platform-ghactions/actions/codeartifact-token@0.0.10
        with:
          domain: ${{ env.CODEARTIFACT_DOMAIN }}
          domain_owner: ${{ env.AWS_ACCOUNT_ID_HUB }}
          aws_region: ${{ env.AWS_REGION }}

      - uses: JoistApp/platform-ghactions/actions/test-runner@0.0.10
        with:
          service_id: ${{ env.SERVICE_ID }}
          branch: ${{ needs.setup.outputs.branch }}
          build_name: ${{ needs.setup.outputs.build_name }}
          codeartifact_token: ${{ steps.codeartifact.outputs.token }}
          test_name: 'StandardRB'
          test_command: |
            docker compose -p "${{ needs.setup.outputs.build_name }}" run --rm ${{ env.SERVICE_ID }} sh -c "bundle exec standardrb"
          aws_account_id_hub: ${{ vars.AWS_ACCOUNT_ID_HUB }}
          aws_region: us-east-1

  test-rspec:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - *codeartifact-aws-creds
      - *codeartifact-token
      - uses: JoistApp/platform-ghactions/actions/test-runner@0.0.10
        with:
          service_id: ${{ env.SERVICE_ID }}
          branch: ${{ needs.setup.outputs.branch }}
          build_name: ${{ needs.setup.outputs.build_name }}
          codeartifact_token: ${{ steps.codeartifact.outputs.token }}
          test_name: 'RSpec'
          test_command: |
            docker compose -p "${{ needs.setup.outputs.build_name }}" run --rm ${{ env.SERVICE_ID }} sh -c "bundle exec rspec"
          aws_account_id_hub: ${{ vars.AWS_ACCOUNT_ID_HUB }}
          aws_region: us-east-1

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rspec-artifacts
          path: |
            coverage/
            spec/rspec.xml
          if-no-files-found: ignore

  report-status:
    runs-on: ubuntu-latest
    needs: [test-standardrb, test-rspec]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Test Status
        id: test-status
        run: |
          if [ "${{ needs.test-standardrb.result }}" = "success" ] && \
             [ "${{ needs.test-rspec.result }}" = "success" ]; then
            echo "state=success" >> $GITHUB_OUTPUT
            echo "description=All tests passed" >> $GITHUB_OUTPUT
          else
            echo "state=failure" >> $GITHUB_OUTPUT
            echo "description=One or more tests failed" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create Commit Status
        run: |
          COMMIT_SHA="${{ github.sha }}"
          STATE="${{ steps.test-status.outputs.state }}"
          DESCRIPTION="${{ steps.test-status.outputs.description }}"
          CONTEXT="ci/tests"
          TARGET_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "Creating commit status:"
          echo "  Commit: ${COMMIT_SHA}"
          echo "  State: ${STATE}"
          echo "  Description: ${DESCRIPTION}"
          echo "  Context: ${CONTEXT}"
          echo "  URL: ${TARGET_URL}"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${COMMIT_SHA}" \
            -d "{
              \"state\": \"${STATE}\",
              \"target_url\": \"${TARGET_URL}\",
              \"description\": \"${DESCRIPTION}\",
              \"context\": \"${CONTEXT}\"
            }"
        shell: bash
